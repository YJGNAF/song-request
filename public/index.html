<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>碳炙Brew · 点歌台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
  <div class="header">
    <div class="brand">
      <span class="brand-cn">碳炙</span><span class="brand-en">Brew</span>
    </div>
    <p class="subtitle">🎵 扫码点歌 · 为你而唱</p>
  </div>

  <div class="container">
    <!-- 无歌手在岗提示 -->
    <div class="no-singer-msg" id="noSingerMsg" style="display:none;">
      <div class="no-singer-icon">🎶</div>
      <h2>当前还没有歌手在岗哦~</h2>
      <p class="no-singer-time">驻唱时间：每周五、周六 18:00~00:00</p>
      <p class="no-singer-bye">期待您的到来</p>
    </div>

    <!-- 点歌内容区 -->
    <div id="songContent" style="display:none;">
    <!-- 搜索框 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索歌曲名或歌手..." autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>

    <!-- 分类标签 -->
    <div class="category-tags" id="categoryTags">
      <button class="category-tag active" data-category="">全部</button>
    </div>

    <!-- 实时点歌队列 -->
    <div class="live-queue" id="liveQueue">
      <h3>🎤 实时点歌队列</h3>
      <div class="empty-state" id="queueEmpty">
        <div class="icon">📭</div>
        <p>还没有人点歌，快来抢沙发 🎵</p>
      </div>
      <div id="queueList"></div>
    </div>

    <!-- 我的点歌 -->
    <div class="my-requests" id="myRequests">
      <h3>📋 我的点歌</h3>
      <div class="empty" id="myRequestsEmpty">还没有点歌，快去选歌吧 🎤</div>
      <div id="myRequestsList"></div>
    </div>

    <!-- 打赏 -->
    <div class="tip-section" id="tipSection">
      <button class="btn-tip" id="btnTip">💰 打赏支持</button>
      <p class="tip-hint" id="tipHint"></p>
    </div>

    <!-- 歌曲列表 -->
    <h3 class="song-list-title">🎶 驻唱歌单</h3>
    <div class="song-list" id="songList">
      <div class="empty-state">
        <div class="icon">🎶</div>
        <p>加载中...</p>
      </div>
    </div>
    </div><!-- end songContent -->
  </div>

  <!-- 打赏弹窗 -->
  <div class="tip-overlay" id="tipOverlay" style="display:none;">
    <div class="tip-modal">
      <div class="tip-close" id="tipClose">×</div>
      <h3>💰 喜欢就来打赏吧</h3>
      <p id="tipMsg" style="color:var(--text-secondary);font-size:14px;margin-bottom:16px;"></p>
      <div class="tip-qr-row" id="tipQrRow">
        <div class="tip-qr-item" id="tipWechat" style="display:none;">
          <img id="wechatImg" src="" alt="微信收款码">
          <span>微信</span>
        </div>
        <div class="tip-qr-item" id="tipAlipay" style="display:none;">
          <img id="alipayImg" src="" alt="支付宝收款码">
          <span>支付宝</span>
        </div>
      </div>
      <p class="tip-no-qr" id="tipNoQr" style="display:none;color:var(--text-muted);">歌手还没设置收款码~</p>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
